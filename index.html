<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Mini Cryptic Crossword</title>

  <style>
    :root {
      --black: #111;
      --white: #fff;
      --light-grey: #e8e8e8;
      --red: #b00020;
      --pale-red: #ffd6d6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--white);
      color: var(--black);
      font-family: Georgia, "Times New Roman", serif;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .masthead {
      border-bottom: 3px double var(--black);
      padding-bottom: 14px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .kicker {
      margin: 0 0 6px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font: 700 12px Arial, sans-serif;
      color: var(--red);
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 6vw, 54px);
      line-height: 1;
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: 15px;
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      font-family: Arial, sans-serif;
    }

    select,
    button {
      border: 1px solid var(--black);
      border-radius: 0;
      background: var(--white);
      color: var(--black);
      padding: 8px 10px;
      font: 700 14px Arial, sans-serif;
    }

    button {
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    button.primary {
      background: var(--black);
      color: var(--white);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .timer {
      border: 1px solid var(--black);
      padding: 8px 10px;
      background: var(--white);
      font: 700 15px "Courier New", monospace;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 420px) 1fr;
      gap: 28px;
      align-items: start;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      width: 100%;
      max-width: 420px;
      border-top: 2px solid var(--black);
      border-left: 2px solid var(--black);
    }

    .cell {
      position: relative;
      aspect-ratio: 1 / 1;
      border-right: 2px solid var(--black);
      border-bottom: 2px solid var(--black);
      background: var(--white);
    }

    .cell.block {
      background: var(--black);
    }

    .cell.correct {
      background: var(--light-grey);
    }

    .cell.incorrect {
      background: var(--pale-red);
    }

    .number {
      position: absolute;
      top: 2px;
      left: 3px;
      font: 700 10px Arial, sans-serif;
      line-height: 1;
      z-index: 1;
    }

    .cell input {
      width: 100%;
      height: 100%;
      border: 0;
      background: transparent;
      color: var(--black);
      text-align: center;
      text-transform: uppercase;
      font: 700 clamp(22px, 5vw, 34px) Arial, sans-serif;
      padding: 10px 0 0;
      outline: none;
    }

    .cell input:focus {
      box-shadow: inset 0 0 0 3px var(--black);
    }

    .actions {
      max-width: 420px;
      margin-top: 14px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      font-family: Arial, sans-serif;
    }

    .score-box {
      max-width: 420px;
      margin-top: 14px;
      border: 2px solid var(--black);
      padding: 12px;
      font-family: Arial, sans-serif;
    }

    .score-big {
      margin: 0 0 4px;
      font-size: 28px;
      font-weight: 800;
    }

    .clues {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .clue-section h2 {
      margin: 0 0 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--black);
      font-size: 20px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .clue-list {
      list-style: none;
      margin: 0;
      padding: 0;
      line-height: 1.25;
      font-size: 16px;
    }

    .clue-list li {
      margin-bottom: 8px;
    }

    .status-message {
      border: 2px solid var(--black);
      padding: 16px;
      font-family: Arial, sans-serif;
      background: var(--white);
    }

    .error {
      border-color: var(--red);
      color: var(--red);
    }

    .footer-note {
      margin-top: 26px;
      padding-top: 14px;
      border-top: 3px double var(--black);
      font-size: 14px;
      line-height: 1.4;
    }

    @media (max-width: 820px) {
      .layout {
        display: block;
      }

      .grid {
        margin-bottom: 22px;
      }

      .clues {
        grid-template-columns: 1fr;
      }

      .controls {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="masthead">
      <div>
        <p class="kicker">Daily 7×7 Mini Cryptic</p>
        <h1 id="puzzle-title">Loading...</h1>
        <p class="subtitle" id="puzzle-subtitle">Loading puzzle data...</p>
      </div>

      <div class="controls">
        <select id="puzzle-select" aria-label="Choose puzzle"></select>
        <div class="timer" id="timer">00:00</div>
      </div>
    </header>

    <section id="app"></section>

    <section class="footer-note">
      <strong>Editor note:</strong> Daily puzzle data is loaded from <code>data/puzzles.json</code>.
      To add a new puzzle, edit that file and add another published puzzle object.
    </section>
  </main>

  <script>
    let puzzles = [];
    let currentPuzzle = null;
    let letters = {};
    let submitted = false;
    let score = null;
    let elapsed = 0;
    let timerRunning = false;
    let timerInterval = null;
    let inputRefs = {};

    const app = document.getElementById("app");
    const puzzleTitle = document.getElementById("puzzle-title");
    const puzzleSubtitle = document.getElementById("puzzle-subtitle");
    const puzzleSelect = document.getElementById("puzzle-select");
    const timer = document.getElementById("timer");

    function getLocalTodayIso() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatTime(totalSeconds) {
      const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
      const seconds = String(totalSeconds % 60).padStart(2, "0");
      return `${minutes}:${seconds}`;
    }

    function startTimer() {
      if (timerRunning || submitted) return;

      timerRunning = true;
      timerInterval = setInterval(() => {
        elapsed += 1;
        timer.textContent = formatTime(elapsed);
      }, 1000);
    }

    function stopTimer() {
      timerRunning = false;
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    function resetPuzzleState() {
      letters = {};
      submitted = false;
      score = null;
      elapsed = 0;
      timerRunning = false;
      inputRefs = {};
      stopTimer();
      timer.textContent = "00:00";
    }

    function isOpen(solutionRows, r, c) {
      return (
        r >= 0 &&
        r < 7 &&
        c >= 0 &&
        c < 7 &&
        solutionRows[r][c] !== "#"
      );
    }

    function analyseGrid(solutionRows) {
      const numbers = {};
      const entries = [];
      let currentNumber = 1;

      for (let r = 0; r < 7; r += 1) {
        for (let c = 0; c < 7; c += 1) {
          if (!isOpen(solutionRows, r, c)) continue;

          const startsAcross =
            (c === 0 || !isOpen(solutionRows, r, c - 1)) &&
            c + 1 < 7 &&
            isOpen(solutionRows, r, c + 1);

          const startsDown =
            (r === 0 || !isOpen(solutionRows, r - 1, c)) &&
            r + 1 < 7 &&
            isOpen(solutionRows, r + 1, c);

          if (startsAcross || startsDown) {
            numbers[`${r}-${c}`] = currentNumber;

            if (startsAcross) {
              let answer = "";
              let cells = [];
              let cc = c;

              while (isOpen(solutionRows, r, cc)) {
                answer += solutionRows[r][cc];
                cells.push(`${r}-${cc}`);
                cc += 1;
              }

              entries.push({
                id: `${currentNumber}A`,
                number: currentNumber,
                direction: "A",
                answer,
                cells
              });
            }

            if (startsDown) {
              let answer = "";
              let cells = [];
              let rr = r;

              while (isOpen(solutionRows, rr, c)) {
                answer += solutionRows[rr][c];
                cells.push(`${rr}-${c}`);
                rr += 1;
              }

              entries.push({
                id: `${currentNumber}D`,
                number: currentNumber,
                direction: "D",
                answer,
                cells
              });
            }

            currentNumber += 1;
          }
        }
      }

      return { numbers, entries };
    }

    function getCells(solutionRows) {
      const cells = [];

      for (let r = 0; r < 7; r += 1) {
        for (let c = 0; c < 7; c += 1) {
          cells.push({
            r,
            c,
            solution: solutionRows[r][c]
          });
        }
      }

      return cells;
    }

    function validatePuzzle(puzzle) {
      if (!puzzle.solutionRows || puzzle.solutionRows.length !== 7) {
        return "Puzzle must have exactly 7 solutionRows.";
      }

      for (const row of puzzle.solutionRows) {
        if (row.length !== 7) {
          return "Each solution row must be exactly 7 characters long.";
        }

        if (!/^[A-Z#]+$/.test(row)) {
          return "Solution rows may only contain uppercase A-Z letters and # symbols.";
        }
      }

      return null;
    }

    function chooseDefaultPuzzle(publishedPuzzles) {
      const today = getLocalTodayIso();

      const todaysPuzzle = publishedPuzzles.find((puzzle) => puzzle.date === today);
      if (todaysPuzzle) return todaysPuzzle;

      const sorted = [...publishedPuzzles].sort((a, b) => b.date.localeCompare(a.date));
      return sorted[0];
    }

    function setCurrentPuzzle(puzzleId) {
      const selected = puzzles.find((puzzle) => puzzle.id === puzzleId);
      if (!selected) return;

      currentPuzzle = selected;
      resetPuzzleState();
      render();
    }

    function moveFocus(currentKey, direction) {
      const cells = getCells(currentPuzzle.solutionRows).filter((cell) => cell.solution !== "#");
      const currentIndex = cells.findIndex((cell) => `${cell.r}-${cell.c}` === currentKey);
      const next = cells[currentIndex + direction];

      if (next) {
        const nextKey = `${next.r}-${next.c}`;
        if (inputRefs[nextKey]) inputRefs[nextKey].focus();
      }
    }

    function handleInput(event, key) {
      if (submitted) return;

      startTimer();

      const value = event.target.value
        .toUpperCase()
        .replace(/[^A-Z]/g, "")
        .slice(-1);

      letters[key] = value;
      event.target.value = value;

      if (value) {
        moveFocus(key, 1);
      }
    }

    function handleKeyDown(event, key) {
      if (submitted) return;

      if (event.key === "Backspace" && !letters[key]) {
        event.preventDefault();
        moveFocus(key, -1);
      }

      if (event.key === "ArrowRight") {
        event.preventDefault();
        moveFocus(key, 1);
      }

      if (event.key === "ArrowLeft") {
        event.preventDefault();
        moveFocus(key, -1);
      }
    }

    function submitPuzzle() {
      const cells = getCells(currentPuzzle.solutionRows);
      const totalLetters = cells.filter((cell) => cell.solution !== "#").length;
      let correct = 0;

      cells.forEach((cell) => {
        const key = `${cell.r}-${cell.c}`;
        if (cell.solution !== "#" && letters[key] === cell.solution) {
          correct += 1;
        }
      });

      submitted = true;
      stopTimer();

      score = {
        correct,
        total: totalLetters,
        percent: Math.round((correct / totalLetters) * 100)
      };

      render();
    }

    function resetPuzzle() {
      resetPuzzleState();
      render();
    }

    function copyResult() {
      if (!score) return;

      const message =
        `Daily Mini Cryptic — ${currentPuzzle.date}\n` +
        `Score: ${score.percent}% (${score.correct}/${score.total})\n` +
        `Time: ${formatTime(elapsed)}`;

      navigator.clipboard.writeText(message);
    }

    function render() {
      if (!currentPuzzle) {
        app.innerHTML = `
          <div class="status-message error">
            No published puzzle was found.
          </div>
        `;
        return;
      }

      const validationError = validatePuzzle(currentPuzzle);

      if (validationError) {
        app.innerHTML = `
          <div class="status-message error">
            <strong>Puzzle data error:</strong> ${validationError}
          </div>
        `;
        return;
      }

      const { numbers, entries } = analyseGrid(currentPuzzle.solutionRows);
      const cells = getCells(currentPuzzle.solutionRows);
      const across = entries.filter((entry) => entry.direction === "A");
      const down = entries.filter((entry) => entry.direction === "D");

      puzzleTitle.textContent = currentPuzzle.title;
      puzzleSubtitle.textContent =
        `${currentPuzzle.date} · Enter your answers, then submit for a percentage score.`;

      puzzleSelect.value = currentPuzzle.id;

      app.innerHTML = `
        <section class="layout">
          <div>
            <div class="grid" id="grid"></div>

            <div class="actions">
              <button class="primary" id="submit-button" ${submitted ? "disabled" : ""}>Submit</button>
              <button id="reset-button">Reset</button>
              <button id="copy-button" ${score ? "" : "disabled"}>Copy result</button>
            </div>

            ${score ? `
              <div class="score-box">
                <p class="score-big">${score.percent}% correct</p>
                <div>${score.correct} of ${score.total} letters correct · Time ${formatTime(elapsed)}</div>
              </div>
            ` : ""}
          </div>

          <div class="clues">
            <section class="clue-section">
              <h2>Across</h2>
              <ol class="clue-list">
                ${across.map((entry) => `
                  <li>
                    <strong>${entry.number}.</strong>
                    ${currentPuzzle.clues[entry.id] || `<em>Missing clue for ${entry.id}</em>`}
                  </li>
                `).join("")}
              </ol>
            </section>

            <section class="clue-section">
              <h2>Down</h2>
              <ol class="clue-list">
                ${down.map((entry) => `
                  <li>
                    <strong>${entry.number}.</strong>
                    ${currentPuzzle.clues[entry.id] || `<em>Missing clue for ${entry.id}</em>`}
                  </li>
                `).join("")}
              </ol>
            </section>
          </div>
        </section>
      `;

      const grid = document.getElementById("grid");
      inputRefs = {};

      cells.forEach((cell) => {
        const key = `${cell.r}-${cell.c}`;
        const isBlock = cell.solution === "#";
        const entered = letters[key] || "";

        const div = document.createElement("div");
        div.className = "cell";

        if (isBlock) {
          div.classList.add("block");
        } else if (submitted && entered === cell.solution) {
          div.classList.add("correct");
        } else if (submitted && entered !== cell.solution) {
          div.classList.add("incorrect");
        }

        if (!isBlock && numbers[key]) {
          const number = document.createElement("span");
          number.className = "number";
          number.textContent = numbers[key];
          div.appendChild(number);
        }

        if (!isBlock) {
          const input = document.createElement("input");
          input.maxLength = 1;
          input.value = entered;
          input.disabled = submitted;
          input.setAttribute("aria-label", `Row ${cell.r + 1}, column ${cell.c + 1}`);

          input.addEventListener("input", (event) => handleInput(event, key));
          input.addEventListener("keydown", (event) => handleKeyDown(event, key));

          inputRefs[key] = input;
          div.appendChild(input);
        }

        grid.appendChild(div);
      });

      document.getElementById("submit-button").addEventListener("click", submitPuzzle);
      document.getElementById("reset-button").addEventListener("click", resetPuzzle);
      document.getElementById("copy-button").addEventListener("click", copyResult);
    }

    async function loadPuzzles() {
      try {
        const response = await fetch("data/puzzles.json", { cache: "no-store" });

        if (!response.ok) {
          throw new Error("Could not load data/puzzles.json");
        }

        const allPuzzles = await response.json();

        puzzles = allPuzzles
          .filter((puzzle) => puzzle.status === "Published")
          .sort((a, b) => a.date.localeCompare(b.date));

        if (puzzles.length === 0) {
          throw new Error("No published puzzles found in puzzles.json");
        }

        puzzleSelect.innerHTML = puzzles
          .map((puzzle) => `<option value="${puzzle.id}">${puzzle.date}</option>`)
          .join("");

        puzzleSelect.addEventListener("change", (event) => {
          setCurrentPuzzle(event.target.value);
        });

        currentPuzzle = chooseDefaultPuzzle(puzzles);
        render();
      } catch (error) {
        puzzleTitle.textContent = "Daily Mini Cryptic";
        puzzleSubtitle.textContent = "There was a problem loading the puzzle data.";

        app.innerHTML = `
          <div class="status-message error">
            <strong>Could not load puzzle data.</strong><br>
            Check that <code>data/puzzles.json</code> exists and contains valid JSON.<br><br>
            Technical message: ${error.message}
          </div>
        `;
      }
    }

    loadPuzzles();
  </script>
</body>
</html>
